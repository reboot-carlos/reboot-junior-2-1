<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOKYO - Chat</title>
  <link rel="icon" type="image/svg+xml" href="assets/goku-icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <img src="assets/saros.jpg" alt="TOKYO Logo" onclick="window.location.href='games.html'" style="cursor:pointer;" title="🤫 Page secrète" />
    <h1>TOKYO</h1>
    <div class="personality">🇫🇷 Prof de France</div>
    <button id="btn-langue" class="btn-langue" onclick="toggleLangue()" title="Changer la langue">🇫🇷 FR</button>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <!-- SIDEBAR -->
    <aside>
      <!-- Retour Accueil -->
      <button class="btn-new-chat" data-action="retour" onclick="window.location.href='index.html'" style="background: linear-gradient(135deg, #FF6347, #FF4500); margin-bottom: 0.5rem;">
        ← Retour Accueil
      </button>

      <!-- Nouveau Chat -->
      <button class="btn-new-chat" data-action="new" onclick="demarrerNouveauChat()">
        🔄 Nouveau Chat
      </button>

      <!-- Personnalités -->
      <div class="sidebar-section">
        <h3>🤖 Personnalités</h3>
        <button class="btn-personality active" data-personality="France" onclick="changerPersonnalite('France')">
          🇫🇷 Prof de France
        </button>
        <button class="btn-personality" data-personality="Mathématiques" onclick="changerPersonnalite('Mathématiques')">
          📐 Prof de Maths
        </button>
        <button class="btn-personality" data-personality="Physique" onclick="changerPersonnalite('Physique')">
          ⚛️ Prof de Physique
        </button>
        <button class="btn-personality" data-personality="Amis" onclick="changerPersonnalite('Amis')">
          👥 Amis
        </button>
        <button class="btn-personality" data-personality="Mangas" onclick="changerPersonnalite('Mangas')">
          📚 Expert Mangas
        </button>
        <button class="btn-personality" data-personality="Animes" onclick="changerPersonnalite('Animes')">
          🎬 Expert Animes
        </button>
        <button class="btn-personality" data-personality="Révision" onclick="changerPersonnalite('Révision')">
          📝 Fiche de Révision
        </button>
      </div>

      <!-- Historique -->
      <div class="sidebar-section">
        <h3>📜 Historique</h3>
        <div class="history-list"></div>
      </div>
    </aside>

    <!-- CHAT ZONE -->
    <div class="chat-column">
      <div id="zone-chat"></div>

      <!-- FORMULAIRE -->
      <div class="form-chat">
        <input id="champ-texte" type="text" placeholder="Écris ton message ici..." />
        <button id="bouton-envoyer" type="button">
          <span id="avion">✈️</span> <span id="envoyer-text">Envoyer</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Conteneur pour avions volants -->
  <div id="conteneur-avions"></div>

  <!-- nginx proxies /ask to the backend container — empty string means same-origin -->
  <script>window.TOKYO_API_URL = '';</script>
  <script src="js/app.js"></script>
</body>
</html>
